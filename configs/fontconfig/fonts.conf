<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
	<!--Define global font rendering settings-->
	<match target="font">
		<edit mode="assign" name="antialias">
			<bool>true</bool>
		</edit>
		<edit mode="assign" name="embeddedbitmap">
			<bool>true</bool>
		</edit>
		<edit mode="assign" name="hinting">
			<bool>true</bool>
		</edit>
		<edit mode="assign" name="autohint">
			<bool>false</bool>
		</edit>
		<edit mode="assign" name="hintstyle">
			<const>hintslight</const>
		</edit>
		<edit mode="assign" name="lcdfilter">
			<const>none</const>
		</edit>
		<edit mode="assign" name="rgba">
			<const>none</const>
		</edit>
	</match>
	<!--Define default fonts for use-->
	<match target="pattern">
		<test name="family" qual="any">
			<string>monospace</string>
		</test>
		<edit binding="strong" mode="prepend" name="family">
			<string>PragmataPro Mono Liga</string>
		</edit>
	</match>
	<match target="pattern">
		<test name="family" qual="any">
			<string>sans</string>
		</test>
		<edit binding="strong" mode="prepend" name="family">
			<string>FiraGO</string>
		</edit>
	</match>
	<match target="pattern">
		<test name="family" qual="any">
			<string>sans serif</string>
		</test>
		<edit binding="strong" mode="prepend" name="family">
			<string>FiraGO</string>
		</edit>
	</match>
	<match target="pattern">
		<test name="family" qual="any">
			<string>sans-serif</string>
		</test>
		<edit binding="strong" mode="prepend" name="family">
			<string>FiraGO</string>
		</edit>
	</match>
	<match target="pattern">
		<test name="family" qual="any">
			<string>serif</string>
		</test>
		<edit binding="strong" mode="prepend" name="family">
			<string>Liberation Serif</string>
		</edit>
	</match>
	<!--Make sure emojis get rendered-->
	<match target="font">
		<test name="family" qual="any">
			<string>Noto Color Emoji</string>
		</test>
		<edit name="embeddedbitmap">
			<bool>true</bool>
		</edit>
	</match>
	<!-- Fix for FiraGO (the hint style is defined as a bool which gets ignored by GTK but incorrectly read by Electron apps allowing us to disbale hinting which is broken) -->
	<match target="font">
		<test qual="any" name="family">
			<string>FiraGO</string>
		</test>
		<edit mode="assign" name="hintstyle">
			<const>hintfull</const>
		</edit>
		<edit mode="assign" name="hintstyle">
			<bool>hintnone</bool>
		</edit>
	</match>
	<!-- Full hinting for fonts less than 10px -->
	<match target="font">
		<test qual="any" name="pixelsize" compare="less">
			<double>10</double>
		</test>
		<edit name="hintstyle" mode="assign">
			<const>hintfull</const>
		</edit>
		<edit name="hinting" mode="assign">
			<bool>true</bool>
		</edit>
	</match>
	<!-- Fix for Calibri -->
	<match target="font">
		<test qual="any" name="family">
			<string>Calibri</string>
		</test>
		<edit name="embeddedbitmap">
			<bool>false</bool>
		</edit>
	</match>
	<!-- No antialiasing for PragmataPro -->
	<match target="font">
		<test name="family" compare="contains">
			<string>PragmataPro</string>
		</test>
		<edit mode="assign" name="antialias">
			<bool>false</bool>
		</edit>
		<edit mode="assign" name="autohint">
			<bool>false</bool>
		</edit>
		<edit mode="assign" name="hintstyle">
			<const>hintfull</const>
		</edit>
	</match>

	<!-- No antialising for old Microsoft fonts -->
	<!-- No antialiasing for Arial -->
	<match target="font">
		<test name="family" compare="eq">
			<string>Arial</string>
		</test>
		<test qual="any" name="pixelsize" compare="less">
			<double>18</double>
		</test>
		<edit mode="assign" name="antialias">
			<bool>false</bool>
		</edit>
		<edit mode="assign" name="hintstyle">
			<const>hintslight</const>
		</edit>
	</match>	
	<!-- No antialiasing for Tahoma -->
	<match target="font">
		<test name="family" compare="eq">
			<string>Tahoma</string>
		</test>
		<test qual="any" name="pixelsize" compare="less">
			<double>18</double>
		</test>
		<edit mode="assign" name="antialias">
			<bool>false</bool>
		</edit>
		<edit mode="assign" name="hintstyle">
			<const>hintslight</const>
		</edit>
	</match>	
	<!-- No antialiasing for Verdana -->
	<match target="font">
		<test name="family" compare="eq">
			<string>Verdana</string>
		</test>
		<test qual="any" name="pixelsize" compare="less">
			<double>18</double>
		</test>
		<edit mode="assign" name="antialias">
			<bool>false</bool>
		</edit>
		<edit mode="assign" name="hintstyle">
			<const>hintslight</const>
		</edit>
	</match>	

	<!-- Font replacements -->
	<!-- Ubuntu font -->
	<match target="pattern">
		<test name="family" compare="contains">
			<string>Ubuntu</string>
		</test>
		<edit name="family" mode="assign" binding="same">
			<string>FiraGO</string>
		</edit>
	</match>
	<!-- Segoe font -->
	<match target="pattern">
		<test name="family" compare="contains">
			<string>Segoe</string>
		</test>
		<edit name="family" mode="assign" binding="same">
			<string>FiraGO</string>
		</edit>
	</match>
</fontconfig>
